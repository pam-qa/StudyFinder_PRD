site_name: StudyFinder PRD
site_description: Product Requirements Document for StudyFinder — a clinical research study discovery and outreach platform.
site_url: https://pam-qa.github.io/StudyFinder_PRD/
repo_url: https://github.com/pam-qa/StudyFinder_PRD
repo_name: pam-qa/StudyFinder_PRD
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    scheme: default
    primary: white
    accent: deep purple
  font:
    text: Inter
    code: Roboto Mono
  features:
    # Paging pattern (GitBook / Axie style)
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - navigation.footer      # prev / next pager at the bottom of each page
    - toc.follow             # "on this page" rail tracks scroll
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - Product Overview: 01-product-overview.md
  - Product Goals: 02-product-goals.md
  - Subscription Tiers: 03-subscription-tiers.md
  - Core Product Areas:
      - Overview: 04-core-product-areas.md
      - Study Discovery: areas/study-discovery.md
      - Search & Filtering: areas/search-and-filtering.md
      - Study Cards & Details: areas/study-cards-and-details.md
      - Scouts: areas/scouts.md
      - Companies, Sponsors & Contacts: areas/companies-sponsors-contacts.md
      - Email Sequences: areas/email-sequences.md
      - Templates: areas/templates.md
      - Tasks & Reports: areas/tasks-and-reports.md
      - Analytics: areas/analytics.md
      - User Management: areas/user-management.md
